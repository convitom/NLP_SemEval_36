#==============================================================================
#  config.yaml  —  SemEval 2018 Task 1 Multi-Label Emotion Classification
#==============================================================================

#  Data
data:
  data_dir: "data/"
  train_file: "2018-E-c-En-train.txt"
  val_file:   "2018-E-c-En-dev.txt"
  test_file:  "2018-E-c-En-test-gold.txt"

  max_length: 128
  num_emotions: 11
  seed: 42

  # ---- Rare-class augmentation ---------------------------------------------------
  augment_rare:  true    # synonym replacement for rare-class samples (train only)
  aug_copies:    2       # N augmented copies per rare-class sample

  # ---- Sampler ------------------------------------------------------------------
  sampler_power: 2.0     # exponent on inv-freq weights (1.0=linear, 2.0=quadratic)
  rare_boost:    3.0     # extra weight multiplier for samples with rare labels

  # ---- pos_weight ---------------------------------------------------------------
  pw_scale:      1.5     # pos_weight = ((N-n_pos)/n_pos)^pw_scale  (1.0=standard)

#  Model
#  ┌─────────┬─────────────────────────────────────────┬────────┐
#  │  Key    │  HuggingFace ID                         │ Params │
#  ├─────────┼─────────────────────────────────────────┼────────┤
#  │ bert    │ google-bert/bert-base-uncased            │ 110M   │
#  │ roberta │ FacebookAI/roberta-base                  │ 125M   │
#  │ deberta │ microsoft/deberta-v3-base                │ 184M   │
#  │ electra │ google/electra-base-discriminator        │ 110M   │
#  └─────────┴─────────────────────────────────────────┴────────┘
model:
  name: "electra"
  dropout: 0.1

#  Training
training:
  epochs: 20
  batch_size: 32
  lr: 2.0e-5
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine_warmup"
  warmup_ratio: 0.1
  step_size: 3
  gamma: 0.1
  early_stopping_patience: 5
  threshold: 0.5

  # ---- Loss --------------------------------------------------------------------
  # "asymmetric"     : standard ASL (same gamma for all classes)
  # "per_class_asl"  : different gamma_neg for rare vs common classes  <- recommended
  loss: "per_class_asl"

  focal_gamma: 2.0

  # Standard ASL params (used when loss == "asymmetric")
  asl_gamma_pos: 1.0
  asl_gamma_neg: 2.0
  asl_clip: 0.0

  # Per-class ASL params (used when loss == "per_class_asl")
  # Rare classes get lower gamma_neg (less suppression of negatives)
  # so the model stays more sensitive to their positive signal
  asl_gamma_pos_common: 1.0   # gamma+ for common classes
  asl_gamma_neg_common: 2.0   # gamma- for common classes
  asl_gamma_pos_rare:   0.0   # gamma+ for rare classes (plain BCE on positives)
  asl_gamma_neg_rare:   1.0   # gamma- for rare classes (gentle suppression)
  asl_clip_rare:        0.0   # no clip for rare classes

  pos_weight: null

#  Results
results:
  base_dir: "results/"
