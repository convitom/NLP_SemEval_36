#==============================================================================
#  config.yaml  —  SemEval 2018 Task 1 Multi-Label Emotion Classification
#  DO NOT EDIT THIS FILE DIRECTLY — use the notebook to override keys
#==============================================================================

#  Data
data:
  data_dir: "data/"              # folder containing the 3 .txt (TSV) files
  # Expected filenames (tab-separated, columns: ID Tweet <11 emotion cols>):
  #   train : 2018-E-c-En-train.txt
  #   val   : 2018-E-c-En-dev.txt
  #   test  : 2018-E-c-En-test-gold.txt
  train_file: "2018-E-c-En-train.txt"
  val_file:   "2018-E-c-En-dev.txt"
  test_file:  "2018-E-c-En-test-gold.txt"

  max_length: 128                # tweets avg ~20 tokens; 128 is safe ceiling
  num_emotions: 11               # anger anticipation disgust fear joy love
                                 # optimism pessimism sadness surprise trust
  seed: 42

#  Model
#  ┌─────────┬─────────────────────────────────────────┬────────┐
#  │  Key    │  HuggingFace ID                         │ Params │
#  ├─────────┼─────────────────────────────────────────┼────────┤
#  │ bert    │ google-bert/bert-base-uncased            │ 110M   │
#  │ roberta │ FacebookAI/roberta-base                  │ 125M   │
#  │ deberta │ microsoft/deberta-v3-base                │ 184M   │
#  │ electra │ google/electra-base-discriminator        │ 110M   │
#  └─────────┴─────────────────────────────────────────┴────────┘
model:
  name: "electra"               # bert | roberta | deberta | electra
  dropout: 0.1

#  Training
training:
  epochs: 20
  batch_size: 32
  lr: 2.0e-5
  weight_decay: 0.01
  optimizer: "adamw"            # adamw | adam | sgd
  scheduler: "cosine_warmup"   # cosine_warmup | cosine | step | none
  warmup_ratio: 0.1
  step_size: 3                  # (only if scheduler == step)
  gamma: 0.1                    # (only if scheduler == step)
  early_stopping_patience: 5

  # ---- Threshold ---------------------------------------------------------------
  threshold: 0.5

  # ---- Loss --------------------------------------------------------------------
  loss: "asymmetric"            # bce | bce_weighted | focal_bce | asymmetric
  focal_gamma: 2.0
  asl_gamma_pos: 1.0
  asl_gamma_neg: 2.0
  asl_clip: 0.0
  pos_weight: null

#  Results
results:
  base_dir: "results/"
